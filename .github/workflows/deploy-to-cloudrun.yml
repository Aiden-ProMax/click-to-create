name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: click-to-create
  REGION: us-west1
  SERVICE_NAME: clickcreate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ env.PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true
    
    - name: Configure Docker with gcloud
      run: |
        gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        docker build -t gcr.io/${{ env.PROJECT_ID }}/autoplanner:latest .
    
    - name: Push Docker image to Container Registry
      run: |
        docker push gcr.io/${{ env.PROJECT_ID }}/autoplanner:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image=gcr.io/${{ env.PROJECT_ID }}/autoplanner:latest \
          --region=${{ env.REGION }} \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars=ENVIRONMENT=production,DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }},GOOGLE_GENERATIVE_AI_KEY=${{ secrets.GEMINI_API_KEY }},DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }},OAUTHLIB_INSECURE_TRANSPORT=false \
          --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
          --memory=512Mi \
          --timeout=3600 \
          --max-instances=10 \
          --project=${{ env.PROJECT_ID }}
    
    - name: Verify deployment
      run: |
        gcloud run services describe ${{ env.SERVICE_NAME }} \
          --region=${{ env.REGION }} \
          --project=${{ env.PROJECT_ID }}
