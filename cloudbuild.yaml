steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autoplanner:latest'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/autoplanner:latest'

  # Step 3: Deploy clickcreate service to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'clickcreate'
      - '--image=gcr.io/$PROJECT_ID/autoplanner:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,DJANGO_SECRET_KEY=${_DJANGO_SECRET_KEY},OAUTHLIB_INSECURE_TRANSPORT=false'
      - '--memory=512Mi'
      - '--timeout=3600'
      - '--max-instances=10'

# Images to push to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/autoplanner:latest'

# Build timeout
timeout: '3600s'

# Substitutions for build variables
substitutions:
  _DJANGO_SECRET_KEY: 'autoplanner-django-secret-key-prod-2026'
