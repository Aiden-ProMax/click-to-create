steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autoplanner:latest'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/autoplanner:latest'

  # Step 3: Deploy clickcreate service to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'clickcreate'
      - '--image=gcr.io/$PROJECT_ID/autoplanner:latest'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,DJANGO_SECRET_KEY=${_DJANGO_SECRET_KEY},DB_NAME=${_DB_NAME},DB_USER=${_DB_USER},DB_PASSWORD=${_DB_PASSWORD},CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION_NAME},OAUTHLIB_INSECURE_TRANSPORT=false'
      - '--add-cloudsql-instances=${_CLOUD_SQL_CONNECTION_NAME}'
      - '--memory=512Mi'
      - '--timeout=3600'
      - '--max-instances=10'

# Images to push to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/autoplanner:latest'

# Build timeout
timeout: '3600s'

# Substitutions for build variables
substitutions:
  _DJANGO_SECRET_KEY: 'autoplanner-django-secret-key-prod-2026'
  _DB_NAME: 'autoplanner'
  _DB_USER: 'autoplanner_user'
  _DB_PASSWORD: 'VUKk2Dr44GI3VDaMyseKPh3a1Mel486rnwEeUPAiVfU'
  _CLOUD_SQL_CONNECTION_NAME: 'click-to-create:us-west1:autoplanner-db-prod-uswest'
