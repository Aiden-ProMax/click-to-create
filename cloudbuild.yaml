steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autoplanner:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autoplanner:latest'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/autoplanner:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autoplanner'
      - '--image=gcr.io/$PROJECT_ID/autoplanner:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,OAUTHLIB_INSECURE_TRANSPORT=false'
      - '--memory=512Mi'
      - '--timeout=3600'
      - '--max-instances=10'

# Push the image to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/autoplanner:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/autoplanner:latest'

# Timeout for the build process
timeout: '3600s'
